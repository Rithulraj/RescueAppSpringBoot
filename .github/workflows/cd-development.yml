name: Continuous Delivery (Development)

on:
  push:
    branches: [ "development" ]

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    # CRITICAL: This links your job to the GitHub environment you just created
    environment: development

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test App
      env:
        S3_BUCKET: ${{ secrets.S3_BUCKET }}
        S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        SPRING_PROFILES_ACTIVE: dev
      run: mvn clean package

    - name: SonarQube Analysis
      run: |
        ./mvnw sonar:sonar \
        -Dsonar.organization=Rithulraj \
        -Dsonar.projectKey=Rithulraj_RescueAppSpringBoot \
        -Dsonar.token=${{ secrets.SONAR_TOKEN }}  

    # Delivery Step: Uploading the JAR so it's ready to be picked up later
    - name: Upload Artifact for Delivery
      uses: actions/upload-artifact@v4
      with:
        name: dev-rescue-app-snapshot
        path: target/*.jar
